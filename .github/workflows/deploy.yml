name: CI/CD Backend Ventas

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/repo-backend-ventas:latest

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Crear .env y docker-compose en EC2 App
        run: |
          COMPOSE_CONTENT=$(cat docker-compose.yml | base64 -w 0)
          aws ssm send-command \
            --instance-ids "i-040e1052a9aa59574" \
            --document-name "AWS-RunShellScript" \
            --parameters commands=["echo $COMPOSE_CONTENT | base64 -d > /home/ssm-user/docker-compose.yml && echo DB_ENDPOINT=${{ secrets.DB_ENDPOINT }} > /home/ssm-user/.env && echo DB_PORT=${{ secrets.DB_PORT }} >> /home/ssm-user/.env && echo DB_NAME=${{ secrets.DB_NAME }} >> /home/ssm-user/.env && echo DB_USERNAME=${{ secrets.DB_USERNAME }} >> /home/ssm-user/.env && echo DB_PASSWORD=${{ secrets.DB_PASSWORD }} >> /home/ssm-user/.env"]

      - name: Ejecutar deploy via SSM en EC2 App
        run: |
          aws ssm send-command \
            --instance-ids "i-040e1052a9aa59574" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='["cd /home/ssm-user && docker-compose pull backend-ventas && docker-compose up -d --no-deps backend-ventas"]'      