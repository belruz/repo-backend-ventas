name: CI/CD Backend Ventas

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/repo-backend-ventas:latest

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Ejecutar deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "i-040e1052a9aa59574" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/repo-backend-ventas:latest",
              "docker stop backend-ventas || true",
              "docker rm backend-ventas || true",
              "docker run -d --name backend-ventas -p 8080:8080 -e DB_ENDPOINT=10.0.2.129 -e DB_PORT=3306 -e DB_NAME=innovatech -e DB_USERNAME=root -e DB_PASSWORD=root1234 --restart always ${{ secrets.DOCKERHUB_USERNAME }}/repo-backend-ventas:latest"
            ]'